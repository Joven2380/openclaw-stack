version: "3.9"

# ================================================================
# Production docker-compose — Hetzner deployment
# Does NOT mount source code (no --reload)
# Uses built image only
# ================================================================

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw_api
    restart: always
    ports:
      - "127.0.0.1:8000:8000"   # localhost only — proxied via Cloudflare Tunnel
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/openclaw
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: pgvector/pgvector:pg16
    container_name: openclaw_db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"   # localhost only
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: openclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"   # localhost only
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
