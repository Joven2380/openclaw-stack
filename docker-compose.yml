services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw_app
    restart: unless-stopped
    expose:
      - "8000"            # internal only — Caddy proxies from outside
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/openclaw
      DATABASE_URL_ASYNC: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/openclaw
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./agents:/app/agents   # edit YAML configs without rebuilding
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: pgvector/pgvector:pg16
    container_name: openclaw_db
    restart: unless-stopped
    expose:
      - "5432"            # internal only
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: openclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    restart: unless-stopped
    expose:
      - "6379"            # internal only
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: openclaw_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
